<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>

    </style>
</head>
<body>
    <div class="form-container">
        <h1>Formulário</h1>

        <form method="POST" action="http://localhost:3003/usuarios">
            <input type="hidden" name="id" value="3">

            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" placeholder="Digite seu Nome">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" placeholder="Insira sua senha"></input>
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea name="bio" id="bio" cols="30" rows="10" placeholder="Conte um pouco sobre você"></textarea>
            </div>
            <filedset class="form-group">
                <legend>Tipo de usuário</legend>
                <label for="admin">
                    <input type="radio" name="tipo" id="admin" value="admin"> Admin
                </label>
                <label for="regular">
                    <input type="radio" name="tipo" id="regular" value="regular"> Regular
                </label>
                <label for="professor">
                    <label type="radio" name="tipo" id="professor" value="professor"> Professor
                </label>
                </label>
            </filedset>
        </form>
    </div>
</body>
</html>
